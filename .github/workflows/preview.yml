name: Preview

# Builds the static preview site for this commit and uploads it as an
# artifact. A separate workflow (`preview-publish.yml`) — triggered on
# `workflow_run` — downloads the artifact and pushes it to the
# gh-pages branch under `preview/main/` (for pushes to main) or
# `preview/pr/<id>/` (for pull requests).
#
# This split keeps untrusted PR code in a permission-less context: the
# build job has only `contents: read`, while the publish job runs from
# the default branch with the elevated token needed for gh-pages.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: preview-build-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'main' }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate preview site
        env:
          PREVIEW_OUT_DIR: .preview
          PREVIEW_BUILD_KIND: ${{ github.event_name == 'pull_request' && 'pr' || 'main' }}
          PREVIEW_BUILD_ID: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || 'main' }}
          PREVIEW_BUILD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          PREVIEW_BUILD_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: npm run preview

      - name: Record metadata
        run: |
          mkdir -p .preview-meta
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "pr" > .preview-meta/kind
            echo "${{ github.event.pull_request.number }}" > .preview-meta/id
          else
            echo "main" > .preview-meta/kind
            echo "main" > .preview-meta/id
          fi
          echo "${{ github.sha }}" > .preview-meta/sha

      - name: Upload preview artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: preview-site
          path: |
            .preview/
            .preview-meta/
          retention-days: 7
          if-no-files-found: error
          include-hidden-files: true
