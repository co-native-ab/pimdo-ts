name: Preview Publish

# Trusted publisher for the preview site. Triggered when the
# `Preview` workflow completes successfully; downloads the artifact it
# produced and pushes it to the gh-pages branch.
#
# Runs in the context of the default branch (workflow_run always uses
# the workflow definition from the default branch), so the elevated
# token cannot be exfiltrated by PR code. All artifact-derived values
# are validated against strict regexes before use, and are passed
# through `env:` rather than inline `${{ }}` interpolation in shell
# bodies, to make injection impossible by construction.

on:
  workflow_run:
    workflows: ["Preview"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: preview-publish
  cancel-in-progress: false

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - name: Download preview artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: preview-site
          path: artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Untrusted: the contents of artifact/.preview-meta/* were written
      # by the build job, which may have run on a fork PR's HEAD. Read
      # the values, validate against strict patterns, and only THEN
      # surface them as step outputs. Anything that fails validation
      # aborts the publish.
      - name: Read & validate metadata
        id: meta
        run: |
          set -euo pipefail
          kind=$(tr -d '\n' < artifact/.preview-meta/kind)
          id=$(tr -d '\n' < artifact/.preview-meta/id)
          sha=$(tr -d '\n' < artifact/.preview-meta/sha)

          case "$kind" in
            pr|main) ;;
            *) echo "::error::Invalid kind: '$kind'"; exit 1 ;;
          esac

          if [ "$kind" = "pr" ]; then
            if ! [[ "$id" =~ ^[1-9][0-9]{0,9}$ ]]; then
              echo "::error::Invalid PR number: '$id'"; exit 1
            fi
            dir="preview/pr/${id}"
            label="PR #${id}"
            echo "is_pr=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=${id}" >> "$GITHUB_OUTPUT"
          else
            if [ "$id" != "main" ]; then
              echo "::error::Invalid id for kind=main: '$id'"; exit 1
            fi
            dir="preview/main"
            label="main"
            echo "is_pr=false" >> "$GITHUB_OUTPUT"
          fi

          if ! [[ "$sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Invalid sha: '$sha'"; exit 1
          fi

          echo "dir=${dir}" >> "$GITHUB_OUTPUT"
          echo "label=${label}" >> "$GITHUB_OUTPUT"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./artifact/.preview
          publish_branch: gh-pages
          destination_dir: ${{ steps.meta.outputs.dir }}
          keep_files: true
          enable_jekyll: false
          commit_message: "preview(${{ steps.meta.outputs.label }}): ${{ steps.meta.outputs.sha }}"
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com

      - name: Compute preview URL
        id: url
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          DEST_DIR: ${{ steps.meta.outputs.dir }}
        run: |
          set -euo pipefail
          owner_lower="$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')"
          echo "url=https://${owner_lower}.github.io/${REPO}/${DEST_DIR}/" >> "$GITHUB_OUTPUT"

      - name: Step summary
        env:
          LABEL: ${{ steps.meta.outputs.label }}
          URL: ${{ steps.url.outputs.url }}
        run: |
          set -euo pipefail
          printf 'Preview published: [%s](%s)\n' "$LABEL" "$URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment
        if: steps.meta.outputs.is_pr == 'true'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v2.9.4
        with:
          header: preview-site
          number: ${{ steps.meta.outputs.pr_number }}
          message: |
            **Preview site** for this PR: ${{ steps.url.outputs.url }}

            Open `index.html` to browse every browser view and MCP `*_list` tool output across the canonical scenario matrix. The site is regenerated on every push and removed when the PR is closed — see [`docs/adr/0012-preview-site-and-list-scenarios.md`](https://github.com/${{ github.repository }}/blob/main/docs/adr/0012-preview-site-and-list-scenarios.md).
