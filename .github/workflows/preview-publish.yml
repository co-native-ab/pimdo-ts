name: Preview Publish

# Trusted publisher for the preview site. Triggered when the
# `Preview` workflow completes successfully; downloads the artifact it
# produced and pushes it to the gh-pages branch.
#
# Runs in the context of the default branch (workflow_run always uses
# the workflow definition from the default branch), so the elevated
# token cannot be exfiltrated by PR code.

on:
  workflow_run:
    workflows: ["Preview"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: preview-publish
  cancel-in-progress: false

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download preview artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: preview-site
          path: artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read metadata
        id: meta
        run: |
          kind=$(cat artifact/.preview-meta/kind)
          id=$(cat artifact/.preview-meta/id)
          sha=$(cat artifact/.preview-meta/sha)
          if [ "$kind" = "pr" ]; then
            echo "dir=preview/pr/${id}" >> "$GITHUB_OUTPUT"
            echo "label=PR #${id}" >> "$GITHUB_OUTPUT"
            echo "is_pr=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=${id}" >> "$GITHUB_OUTPUT"
          else
            echo "dir=preview/main" >> "$GITHUB_OUTPUT"
            echo "label=main" >> "$GITHUB_OUTPUT"
            echo "is_pr=false" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./artifact/.preview
          publish_branch: gh-pages
          destination_dir: ${{ steps.meta.outputs.dir }}
          keep_files: true
          enable_jekyll: false
          commit_message: "preview(${{ steps.meta.outputs.label }}): ${{ steps.meta.outputs.sha }}"
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com

      - name: Compute preview URL
        id: url
        run: |
          owner_lower="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          repo="${GITHUB_REPOSITORY##*/}"
          echo "url=https://${owner_lower}.github.io/${repo}/${{ steps.meta.outputs.dir }}/" >> "$GITHUB_OUTPUT"

      - name: Step summary
        run: |
          echo "Preview published: [${{ steps.meta.outputs.label }}](${{ steps.url.outputs.url }})" >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment
        if: steps.meta.outputs.is_pr == 'true'
        uses: marocchino/sticky-pull-request-comment@52423e01640425a022ef5fd42c6fb5f633a02728 # v2.9.4
        with:
          header: preview-site
          number: ${{ steps.meta.outputs.pr_number }}
          message: |
            **Preview site** for this PR: ${{ steps.url.outputs.url }}

            Open `index.html` to browse every browser view and MCP `*_list` tool output across the canonical scenario matrix. The site is regenerated on every push and removed when the PR is closed — see [`docs/adr/0012-preview-site-and-list-scenarios.md`](https://github.com/${{ github.repository }}/blob/main/docs/adr/0012-preview-site-and-list-scenarios.md).
