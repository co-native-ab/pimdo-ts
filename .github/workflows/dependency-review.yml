name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dependency-review-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
          # Permissive licenses only. Drift into copyleft (GPL/AGPL/LGPL)
          # or unrecognised licenses must be an explicit decision, not a
          # silent transitive bump.
          allow-licenses: >-
            MIT,
            ISC,
            Apache-2.0,
            BSD-2-Clause,
            BSD-3-Clause,
            0BSD,
            Unlicense,
            CC0-1.0,
            BlueOak-1.0.0
