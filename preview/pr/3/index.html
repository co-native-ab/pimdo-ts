<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>pimdo preview</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">pimdo · preview</div>
    <div class="controls">
      <label>
        Scenario filter
        <select id="scenario-filter">
          <option value="">(all)</option>
          <option>landing</option>
          <option>success</option>
          <option>error</option>
          <option>confirm</option>
          <option>done</option>
          <option>empty</option>
          <option>single</option>
          <option>pair</option>
          <option>full</option>
          <option>next-page</option>
        </select>
      </label>
      <label class="theme-toggle">
        Theme
        <select id="theme">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </label>
      <button id="copy-link" type="button">Copy link</button>
    </div>
  </header>

  <main class="layout">
    <nav id="sidebar" aria-label="Preview index"></nav>
    <section id="content">
      <div class="empty">Select an entry from the sidebar.</div>
    </section>
  </main>

  <script id="manifest" type="application/json">{"schemaVersion":1,"generator":"scripts/preview/generate.ts","views":[{"name":"login","family":"Auth","description":"MSAL loopback landing / success / error pages.","kind":"static","scenarios":[{"id":"landing","label":"Landing"},{"id":"success","label":"Success"},{"id":"error","label":"Error"}]},{"name":"logout","family":"Auth","description":"Logout confirmation + signed-out state.","kind":"static","scenarios":[{"id":"confirm","label":"Confirm"},{"id":"done","label":"Done"}]},{"name":"requester","family":"Group","description":"Multi-row activation form. Each row is one requestable item.","kind":"row-form","scenarios":[{"id":"empty","label":"empty"},{"id":"single","label":"single"},{"id":"pair","label":"pair"},{"id":"full","label":"full"},{"id":"next-page","label":"next-page"}]},{"name":"approver","family":"Group","description":"Reviewer flow. One row per pending approval.","kind":"row-form","scenarios":[{"id":"empty","label":"empty"},{"id":"single","label":"single"},{"id":"pair","label":"pair"},{"id":"full","label":"full"},{"id":"next-page","label":"next-page"}]},{"name":"confirmer","family":"Group","description":"Confirmation flow used by deactivate. One row per item.","kind":"row-form","scenarios":[{"id":"empty","label":"empty"},{"id":"single","label":"single"},{"id":"pair","label":"pair"},{"id":"full","label":"full"},{"id":"next-page","label":"next-page"}]}],"tools":[{"name":"pim_group_eligible_list","family":"Group","description":"Groups the signed-in user is eligible to activate via PIM.","scenarios":[{"id":"empty","label":"empty"},{"id":"single","label":"single"},{"id":"pair","label":"pair"},{"id":"full","label":"full"},{"id":"next-page","label":"next-page"}]},{"name":"pim_group_active_list","family":"Group","description":"Currently active PIM group assignments for the signed-in user.","scenarios":[{"id":"empty","label":"empty"},{"id":"single","label":"single"},{"id":"pair","label":"pair"},{"id":"full","label":"full"},{"id":"next-page","label":"next-page"}]},{"name":"pim_group_request_list","family":"Group","description":"Pending PIM group requests submitted by the signed-in user.","scenarios":[{"id":"empty","label":"empty"},{"id":"single","label":"single"},{"id":"pair","label":"pair"},{"id":"full","label":"full"},{"id":"next-page","label":"next-page"}]},{"name":"pim_group_approval_list","family":"Group","description":"Pending PIM group approvals assigned to the signed-in user.","scenarios":[{"id":"empty","label":"empty"},{"id":"single","label":"single"},{"id":"pair","label":"pair"},{"id":"full","label":"full"},{"id":"next-page","label":"next-page"}]},{"name":"pim_role_entra_eligible_list","family":"Entra Role","description":"Entra directory roles the signed-in user is eligible to activate.","scenarios":[{"id":"empty","label":"empty"},{"id":"single","label":"single"},{"id":"pair","label":"pair"},{"id":"full","label":"full"},{"id":"next-page","label":"next-page"}]},{"name":"pim_role_entra_active_list","family":"Entra Role","description":"Currently active PIM Entra-role assignments for the signed-in user.","scenarios":[{"id":"empty","label":"empty"},{"id":"single","label":"single"},{"id":"pair","label":"pair"},{"id":"full","label":"full"},{"id":"next-page","label":"next-page"}]},{"name":"pim_role_entra_request_list","family":"Entra Role","description":"Pending PIM Entra-role requests submitted by the signed-in user.","scenarios":[{"id":"empty","label":"empty"},{"id":"single","label":"single"},{"id":"pair","label":"pair"},{"id":"full","label":"full"},{"id":"next-page","label":"next-page"}]},{"name":"pim_role_entra_approval_list","family":"Entra Role","description":"Pending PIM Entra-role approvals assigned to the signed-in user.","scenarios":[{"id":"empty","label":"empty"},{"id":"single","label":"single"},{"id":"pair","label":"pair"},{"id":"full","label":"full"},{"id":"next-page","label":"next-page"}]},{"name":"pim_role_azure_eligible_list","family":"Azure Role","description":"Azure resource roles the signed-in user is eligible to activate.","scenarios":[{"id":"empty","label":"empty"},{"id":"single","label":"single"},{"id":"pair","label":"pair"},{"id":"full","label":"full"},{"id":"next-page","label":"next-page"}]},{"name":"pim_role_azure_active_list","family":"Azure Role","description":"Currently active PIM Azure-role assignments for the signed-in user.","scenarios":[{"id":"empty","label":"empty"},{"id":"single","label":"single"},{"id":"pair","label":"pair"},{"id":"full","label":"full"},{"id":"next-page","label":"next-page"}]},{"name":"pim_role_azure_request_list","family":"Azure Role","description":"Pending PIM Azure-role requests submitted by the signed-in user.","scenarios":[{"id":"empty","label":"empty"},{"id":"single","label":"single"},{"id":"pair","label":"pair"},{"id":"full","label":"full"},{"id":"next-page","label":"next-page"}]},{"name":"pim_role_azure_approval_list","family":"Azure Role","description":"Pending PIM Azure-role approvals assigned to the signed-in user.","scenarios":[{"id":"empty","label":"empty"},{"id":"single","label":"single"},{"id":"pair","label":"pair"},{"id":"full","label":"full"},{"id":"next-page","label":"next-page"}]}]}</script>
  <script>
'use strict';
(function () {
  var manifest = JSON.parse(document.getElementById('manifest').textContent);
  var sidebar = document.getElementById('sidebar');
  var content = document.getElementById('content');
  var filterEl = document.getElementById('scenario-filter');
  var themeEl = document.getElementById('theme');
  var copyBtn = document.getElementById('copy-link');

  // Group entries by family.
  var families = {};
  function add(family, kind, item) {
    var key = family + ' · ' + (kind === 'view' ? 'Views' : 'Tools');
    if (!families[key]) families[key] = [];
    families[key].push({ kind: kind, item: item });
  }
  manifest.views.forEach(function (v) { add(v.family, 'view', v); });
  manifest.tools.forEach(function (t) { add(t.family, 'tool', t); });

  function renderSidebar() {
    sidebar.innerHTML = '';
    Object.keys(families).sort().forEach(function (familyKey) {
      var section = document.createElement('section');
      var h = document.createElement('h2');
      h.textContent = familyKey;
      section.appendChild(h);
      families[familyKey].forEach(function (entry) {
        var name = entry.item.name;
        var group = document.createElement('div');
        group.className = 'entry';
        var label = document.createElement('div');
        label.className = 'entry-label';
        label.textContent = name;
        group.appendChild(label);
        var sub = document.createElement('div');
        sub.className = 'entry-desc';
        sub.textContent = entry.item.description;
        group.appendChild(sub);
        var sList = document.createElement('div');
        sList.className = 'scenarios';
        entry.item.scenarios.forEach(function (sc) {
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.textContent = sc.label;
          btn.dataset.kind = entry.kind;
          btn.dataset.name = name;
          btn.dataset.scenario = sc.id;
          btn.addEventListener('click', function () { select(entry.kind, name, sc.id); });
          sList.appendChild(btn);
        });
        group.appendChild(sList);
        section.appendChild(group);
      });
      sidebar.appendChild(section);
    });
    applyFilter();
  }

  function applyFilter() {
    var filter = filterEl.value.trim();
    sidebar.querySelectorAll('button').forEach(function (b) {
      var match = !filter || b.dataset.scenario === filter;
      b.style.display = match ? '' : 'none';
    });
  }

  function select(kind, name, scenario) {
    var theme = themeEl.value;
    history.replaceState(null, '', '#' + kind + '/' + name + '/' + scenario);
    sidebar.querySelectorAll('button').forEach(function (b) {
      b.classList.toggle('active', b.dataset.kind === kind && b.dataset.name === name && b.dataset.scenario === scenario);
    });
    var basePath = kind === 'view'
      ? 'views/' + name + '/' + scenario + '/' + theme + '.html'
      : 'tools/' + name + '/' + scenario + '.html';
    var sourcePath = kind === 'view'
      ? 'views/' + name + '/' + scenario + '/' + theme + '.html'
      : 'tools/' + name + '/' + scenario + '.md';
    var screenshotPath = kind === 'view'
      ? 'views/' + name + '/' + scenario + '/' + theme + '.png'
      : null;
    content.innerHTML = '';
    var tabs = document.createElement('div');
    tabs.className = 'tabs';
    var rendered = tab('Rendered');
    var screenshot = tab('Screenshot');
    var source = tab('Source');
    [rendered, screenshot, source].forEach(function (t) { tabs.appendChild(t); });
    content.appendChild(tabs);
    var panel = document.createElement('div');
    panel.className = 'panel';
    content.appendChild(panel);

    function show(which) {
      [rendered, screenshot, source].forEach(function (t) { t.classList.remove('active'); });
      which.classList.add('active');
      panel.innerHTML = '';
      if (which === rendered) {
        var iframe = document.createElement('iframe');
        iframe.src = basePath;
        iframe.title = name + ' / ' + scenario + ' / ' + theme;
        panel.appendChild(iframe);
      } else if (which === screenshot) {
        if (screenshotPath) {
          var img = new Image();
          img.alt = name + ' / ' + scenario + ' / ' + theme;
          img.onerror = function () {
            panel.innerHTML = '<p class="placeholder">Screenshot not yet generated. Run <code>npm run preview:screenshots</code> (optional, requires Playwright) to produce PNG snapshots.</p>';
          };
          img.src = screenshotPath;
          panel.appendChild(img);
        } else {
          panel.innerHTML = '<p class="placeholder">Tool output is text-only — no screenshot.</p>';
        }
      } else {
        var pre = document.createElement('pre');
        fetch(sourcePath).then(function (r) { return r.text(); }).then(function (t) { pre.textContent = t; });
        panel.appendChild(pre);
      }
    }

    rendered.addEventListener('click', function () { show(rendered); });
    screenshot.addEventListener('click', function () { show(screenshot); });
    source.addEventListener('click', function () { show(source); });
    show(rendered);
  }

  function tab(label) {
    var b = document.createElement('button');
    b.type = 'button';
    b.className = 'tab';
    b.textContent = label;
    return b;
  }

  filterEl.addEventListener('change', applyFilter);
  themeEl.addEventListener('change', function () {
    var active = sidebar.querySelector('button.active');
    if (active) select(active.dataset.kind, active.dataset.name, active.dataset.scenario);
  });
  copyBtn.addEventListener('click', function () {
    navigator.clipboard.writeText(window.location.href).catch(function () {});
  });

  renderSidebar();

  // Restore from hash if present.
  var m = window.location.hash.match(/^#(view|tool)\/([^\/]+)\/(.+)$/);
  if (m) select(m[1], m[2], m[3]);
})();

  </script>
</body>
</html>
